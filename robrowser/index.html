<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WellkaRO — Ragnarok Online</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #robrowser-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        .loading-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a0a2e 0%, #1a0a3e 50%, #0a0a2e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .loading-screen h1 {
            font-size: 3rem;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
        }
        .loading-bar {
            width: 300px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        .loading-bar-inner {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #4d96ff, #6bcb77);
            border-radius: 2px;
            animation: loading 3s ease-in-out forwards;
        }
        @keyframes loading {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
        .status { margin-top: 1rem; font-size: 0.9rem; color: #888; }
    </style>
</head>
<body>
    <div id="robrowser-container">
        <div class="loading-screen" id="loading">
            <h1>WellkaRO</h1>
            <div class="loading-bar"><div class="loading-bar-inner"></div></div>
            <p class="status" id="status">Carregando cliente web...</p>
        </div>
    </div>

    <!-- roBrowserLegacy será carregado aqui -->
    <!-- Descomente a linha abaixo após instalar o roBrowser -->
    <!-- <script src="js/roBrowser.js"></script> -->

    <script>
        /**
         * Configuração do roBrowser
         * Documentação: https://github.com/nicBrowser/roBrowserLegacy
         */
        var ROConfig = {
            target:     document.getElementById("robrowser-container"),
            type:       "frame",
            width:      window.innerWidth,
            height:     window.innerHeight,
            servers: [{
                display:    "WellkaRO",
                desc:       "Servidor WellkaRO",
                address:    "wss://wellkaro.wellka.com.br/ws",
                port:       6900,
                version:    20,
                langtype:   12,
                packetver:  20211103,
            }],
            grfList:    "DATA.INI",
            remoteClient: "https://wellkaro.wellka.com.br/remote/",
            packetver:  20211103,
            skipServerList: true,
            skipIntro:  false,
        };

        // Atualizar status
        document.getElementById("status").textContent = "Conectando ao servidor...";

        // Iniciar roBrowser quando disponível
        if (typeof ROBrowser !== "undefined") {
            var ro = new ROBrowser(ROConfig);
            ro.start();
        } else {
            setTimeout(() => {
                document.getElementById("status").textContent =
                    "⚠️ roBrowser não carregado. Verifique se js/roBrowser.js existe.";
            }, 3500);
        }
    </script>
</body>
</html>
