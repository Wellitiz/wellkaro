# ═══════════════════════════════════════════════════════════════════
# Nginx — wellkaro.wellka.com.br
# ═══════════════════════════════════════════════════════════════════
# Copiar para: /etc/nginx/sites-available/wellkaro
# Ativar:      sudo ln -s /etc/nginx/sites-available/wellkaro /etc/nginx/sites-enabled/
# Testar:      sudo nginx -t
# Recarregar:  sudo systemctl reload nginx
# SSL:         sudo certbot --nginx -d wellkaro.wellka.com.br
# ═══════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name wellkaro.wellka.com.br;

    # ─── Cliente Web (roBrowser) ────────────────────────────────
    # Serve os arquivos estáticos do roBrowser
    location / {
        root /home/ubuntu/wellkaro/robrowser;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache de assets estáticos
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─── WebSocket Proxy (wsProxy) ──────────────────────────────
    # O roBrowser conecta via WebSocket ao servidor de jogo
    location /ws {
        proxy_pass http://127.0.0.1:5999;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ─── Remote Client (Assets GRF) ────────────────────────────
    # Serve sprites, mapas, texturas do data.grf via HTTP
    location /remote/ {
        proxy_pass http://127.0.0.1:3338/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Cache agressivo para assets de jogo (raramente mudam)
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # ─── Painel GM (Flask) ──────────────────────────────────────
    # Painel administrativo do servidor
    location /gm {
        alias /home/ubuntu/wellkaro/gm/static;
        index index.html;
        try_files $uri $uri/ @gm_proxy;
    }

    location @gm_proxy {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Script-Name /gm;
    }

    # ─── API do Painel GM ───────────────────────────────────────
    location /gm/api {
        proxy_pass http://127.0.0.1:5000/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
